name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        if: steps.check.outputs.EXISTS == 'false'
        run: npm ci

      - name: Compile TypeScript
        if: steps.check.outputs.EXISTS == 'false'
        run: npm run compile

      - name: Package VSIX
        if: steps.check.outputs.EXISTS == 'false'
        run: npx @vscode/vsce package --allow-missing-repository

      - name: Create tag and release
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          git tag "${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Brainrot v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Brainrot - Sound & Image on Failure v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download the `.vsix` file below
            2. Open Cursor/VS Code
            3. `Ctrl+Shift+P` → "Extensions: Install from VSIX..."
            4. Select the downloaded file
          files: "*.vsix"
          generate_release_notes: true
